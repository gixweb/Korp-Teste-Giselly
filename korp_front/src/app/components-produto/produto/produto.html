<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Descrição</th>
            <th>Saldo</th>
            <th>Valor</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let p of produtos">
            <td>{{ p.id }}</td>
            <td>{{ p.codigo }}</td>
            <td>{{ p.descricao }}</td>
            <td>{{ p.saldo }}</td>
            <td>R$ {{ p.valor | number:'1.2-2' }}</td>
            <td>
                <button mat-raised-button color="accent" (click)="editar(p)" style="margin-right: 8px;">Editar</button>
                <button mat-raised-button color="warn" (click)="excluir(p.id)">Excluir</button>
            </td>
        </tr>
    </tbody>
</table>
