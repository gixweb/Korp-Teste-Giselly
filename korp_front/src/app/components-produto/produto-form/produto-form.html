<form>
    <input [(ngModel)]="produtoForm.codigo" name="codigo" placeholder="Código">
    <input [(ngModel)]="produtoForm.descricao" name="descricao" type="text" placeholder="Descrição">
    <input [(ngModel)]="produtoForm.saldo" name="saldo" type="number" placeholder="Saldo">
    <input [(ngModel)]="produtoForm.valor" name="valor" type="number" placeholder="Valor">
    <button type="button" (click)="enviar()" class="btn btn-primary">Salvar Produto</button>
</form>
