<form class="p-3">
    <div class="mb-3">
        <label class="form-label">Número da Nota</label>
        <input type="text" class="form-control text-muted" value="Nº Gerado Automaticamente" disabled>
    </div>
    <div class="mb-3">
        <label class="form-label">Data de Emissão</label>
        <input type="date" [(ngModel)]="notaForm.dataEmissao" name="dataEmissao" class="form-control">
    </div>
    <!-- SEÇÃO DE ADICIONAR ITENS -->
    <div class="border p-3 mb-3 bg-light rounded">
        <h2>Adicionar Itens</h2>
        <div class="d-flex gap-2 mb-2">
            <select [(ngModel)]="produtoSelecionadoid" name="prodSel" class="form-select">
                <option value="null">Selecione um produto</option>
                <option *ngFor="let p of produtos" [value]="p.id">{{ p.codigo }} (Saldo: {{p.saldo}}) - R$ {{ p.valor |
                    number:'1.2-2' }}</option>
            </select>

            <input type="number" [(ngModel)]="quantidadeSelecionada" name="qtdSel" class="form-control"
                style="width: 80px;" min="1">

            <button type="button" (click)="adicionarProduto()" class="btn btn-primary">Add</button>
        </div>
        <!-- LISTA DE ITENS JÁ ADICIONADOS -->
        <ul class="list-group list-group-flush small" *ngIf="notaForm.itens.length > 0">
            <li *ngFor="let item of notaForm.itens" class="list-group-item d-flex justify-content-between">
                <span>{{ item.produtoDescricao }} (x{{item.quantidade}})</span>
                <span>R$ {{ item.valorTotal | number:'1.2-2' }}</span>
            </li>
        </ul>
    </div>
    <div class="mb-3">
        <strong>Valor Total: R$ {{ notaForm.valorTotal | number:'1.2-2' }}</strong>
    </div>
    <div class="d-flex gap-2">
        <button type="button" (click)="salvar()" class="btn btn-success flex-grow-1">Salvar Nota</button>
        <button type="button" (click)="limpar()" class="btn btn-outline-danger">Limpar</button>
    </div>
</form>
