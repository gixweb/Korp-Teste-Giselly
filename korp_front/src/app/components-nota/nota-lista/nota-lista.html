<div *ngIf="carregando" class="spinner">
    Processando impressão... aguarde...
</div>
<table *ngIf="!carregando">
    <thead>
        <tr>
            <th>ID</th>
            <th>Número</th>
            <th>Quantidade</th>
            <th>Data de Emissão</th>
            <th>Valor Total</th>
            <th>Itens</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let nota of notas">
            <td>{{ nota.id }}</td>
            <td>{{ nota.numero }}</td>
            <td>{{ nota.quantidade }}</td>
            <td>{{ nota.dataEmissao }}</td>
            <td>{{ nota.valorTotal }}</td>
            <td>{{ nota.itens }}</td>
            <td>{{ nota.status }}</td>
            <td>
                <button (click)="editar(nota)">Editar</button>
                <button (click)="imprimir(nota)" [disabled]="nota.status !== 'Ativa'"> Imprimir</button>
                <button (click)="excluir(nota)">Excluir</button>
            </td>
        </tr>
    </tbody>
</table>
