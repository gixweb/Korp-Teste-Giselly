<div *ngIf="carregando" class="spinner">
    Processando impressão... aguarde...
</div>
<table *ngIf="!carregando">
    <thead>
        <tr>
            <th>Data de Emissão</th>
            <th>Valor Total</th>
            <th>Itens</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let nota of notas">
            <td>{{ nota.numeroNota }}</td>
            <td>{{ nota.dataEmissao | date:'dd/MM/yyyy' }}</td>
            <td>R$ {{ nota.valorTotal | number:'1.2-2' }}</td>
            <td>{{ nota.itens?.length }} itens</td>
            <td>
                <span class="badge" [ngClass]="{'bg-success': nota.status === 1, 'bg-dark': nota.status === 4}">
                    {{ nota.status === 1 ? 'Ativa' : (nota.status === 4 ? 'Fechada' : nota.status) }}
                </span>
            </td>
            <td>
                <button (click)="imprimir(nota)" class="btn btn-sm btn-primary"
                    [disabled]="nota.status !== 1">Imprimir</button>
                <button (click)="excluir(nota)" class="btn btn-sm btn-danger ms-2">Excluir</button>
            </td>
        </tr>
    </tbody>
</table>
